<!doctype html>
<html lang="fr">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>La Méthode Griffes Vivienne</title>    
    <!-- Google Fonts - Typographie élégante -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      type="module">
      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const analyticsWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      const hasPlaceholderEnv =
        analyticsEndpoint.includes("%VITE_") ||
        analyticsWebsiteId.includes("%VITE_");

      // Vercel previews may omit analytics env vars. Load Umami only when the
      // endpoint is configured correctly so preview deployments do not emit
      // noisy network errors for a non-existent local analytics host.
      if (!hasPlaceholderEnv && analyticsEndpoint && analyticsWebsiteId) {
        try {
          const analyticsScript = document.createElement("script");
          analyticsScript.defer = true;
          analyticsScript.src = new URL("/umami", analyticsEndpoint).toString();
          analyticsScript.dataset.websiteId = analyticsWebsiteId;
          document.body.appendChild(analyticsScript);
        } catch (error) {
          console.warn("[Analytics] Skipping Umami script because the endpoint is invalid.", error);
        }
      }
    </script>
  </body>

</html>
